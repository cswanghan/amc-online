<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMC Online · 登录</title>
    <script src="analytics.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --cream: #faf8f5; --warm: #f3ede6; --rose: #c4a08a; --rose-light: #e8d5c8;
            --rose-bg: #fdf5f0; --text: #3d3530; --text-light: #8a7e76; --accent: #b07d62;
            --success: #6b9a7d; --error: #c47070;
        }
        body {
            font-family: 'Noto Serif SC', 'Georgia', serif;
            background: var(--cream); min-height: 100vh; color: var(--text);
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .auth-container { width: 100%; max-width: 400px; }
        .auth-header { text-align: center; margin-bottom: 36px; }
        .auth-header .icon { font-size: 2.4rem; margin-bottom: 8px; }
        .auth-header h1 {
            font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700; margin-bottom: 4px;
        }
        .auth-header .sub { color: var(--text-light); font-size: 0.85rem; }

        .auth-card {
            background: white; border: 1px solid var(--warm); border-radius: 16px;
            padding: 32px 28px; position: relative;
        }
        .auth-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: var(--rose-light); border-radius: 16px 16px 0 0;
        }

        .tabs {
            display: flex; border-bottom: 1px solid var(--warm); margin: -32px -28px 24px;
            padding: 0 28px;
        }
        .tab {
            flex: 1; text-align: center; padding: 14px 0; font-size: 0.9rem;
            color: var(--text-light); cursor: pointer; border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        .tab:hover { color: var(--text); }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

        .form-group { margin-bottom: 18px; }
        .form-label {
            display: block; font-size: 0.8rem; color: var(--text-light);
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px;
        }
        .form-input {
            width: 100%; padding: 12px 14px; border: 1px solid var(--warm); border-radius: 10px;
            font-size: 0.95rem; font-family: inherit; color: var(--text);
            background: var(--cream); transition: border-color 0.2s; outline: none;
        }
        .form-input:focus { border-color: var(--accent); }
        .form-input::placeholder { color: #c5b8ad; }

        .submit-btn {
            width: 100%; padding: 13px; border: none; border-radius: 20px;
            background: var(--accent); color: white; font-size: 0.95rem;
            font-family: inherit; font-weight: 500; cursor: pointer; transition: background 0.2s;
            margin-top: 4px;
        }
        .submit-btn:hover { background: #9a6b52; }
        .submit-btn:disabled { background: var(--rose-light); cursor: not-allowed; }

        .message {
            margin-top: 14px; padding: 10px 14px; border-radius: 8px;
            font-size: 0.85rem; display: none;
        }
        .message.show { display: block; }
        .message.error { background: #fdf0f0; color: #8b4444; }
        .message.success { background: #edf5f0; color: #3d6b4f; }

        .auth-footer {
            text-align: center; margin-top: 20px;
            display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;
        }
        .auth-footer a, .auth-footer button {
            color: var(--text-light); text-decoration: none; font-size: 0.85rem;
            padding: 6px 16px; border: 1px solid var(--warm); border-radius: 14px;
            transition: all 0.2s; background: transparent; font-family: inherit; cursor: pointer;
        }
        .auth-footer a:hover, .auth-footer button:hover { color: var(--accent); border-color: var(--rose); }

        #loginForm, #registerForm { display: none; }
        #loginForm.active, #registerForm.active { display: block; }
    </style>
</head>
<body>
<div class="auth-container">
    <div class="auth-header">
        <div class="icon">🦘</div>
        <h1>AMC Online</h1>
        <p class="sub" data-i18n="login_sub">登录或注册开始练习</p>
    </div>

    <div class="auth-card">
        <div class="tabs">
            <div class="tab active" onclick="showTab('login')" data-i18n="tab_login">登录</div>
            <div class="tab" onclick="showTab('register')" data-i18n="tab_register">注册</div>
        </div>

        <form id="loginForm" class="active" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label class="form-label" data-i18n="label_username">用户名</label>
                <input class="form-input" name="username" data-i18n-placeholder="ph_username" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label class="form-label" data-i18n="label_password">密码</label>
                <input class="form-input" name="password" type="password" data-i18n-placeholder="ph_password" placeholder="请输入密码" required>
            </div>
            <button class="submit-btn" type="submit" data-i18n="btn_login">登录</button>
            <div class="message" id="loginMsg"></div>
        </form>

        <form id="registerForm" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label class="form-label" data-i18n="label_username">用户名</label>
                <input class="form-input" name="username" data-i18n-placeholder="ph_username_reg" placeholder="3-20 字符" required>
            </div>
            <div class="form-group">
                <label class="form-label" data-i18n="label_password">密码</label>
                <input class="form-input" name="password" type="password" data-i18n-placeholder="ph_password_reg" placeholder="至少 6 位" required>
            </div>
            <div class="form-group">
                <label class="form-label" data-i18n="label_email">邮箱</label>
                <input class="form-input" name="email" type="email" data-i18n-placeholder="ph_email" placeholder="用于找回密码" required>
            </div>
            <div class="form-group">
                <label class="form-label" data-i18n="label_phone">手机号（选填）</label>
                <input class="form-input" name="phone" data-i18n-placeholder="ph_phone" placeholder="选填">
            </div>
            <button class="submit-btn" type="submit" data-i18n="btn_register">注册</button>
            <div class="message" id="registerMsg"></div>
        </form>
    </div>

    <div class="auth-footer">
        <a href="index.html" data-i18n="back_home">← 返回首页</a>
        <button class="i18n-toggle" onclick="I18n.toggle()" style="padding:4px 14px;border-radius:999px;border:1px solid rgba(0,0,0,0.1);background:white;font-size:0.82rem;font-family:inherit;cursor:pointer;">EN</button>
    </div>
</div>

<script>
window.I18N = {
    zh: {
        login_sub: '登录或注册开始练习',
        tab_login: '登录',
        tab_register: '注册',
        label_username: '用户名',
        label_password: '密码',
        label_email: '邮箱',
        label_phone: '手机号（选填）',
        ph_username: '请输入用户名',
        ph_password: '请输入密码',
        ph_username_reg: '3-20 字符',
        ph_password_reg: '至少 6 位',
        ph_email: '用于找回密码',
        ph_phone: '选填',
        btn_login: '登录',
        btn_register: '注册',
        back_home: '← 返回首页',
        err_server: '服务端错误',
        err_network: '网络错误: ',
    },
    en: {
        login_sub: 'Log in or register to start practicing',
        tab_login: 'Login',
        tab_register: 'Register',
        label_username: 'USERNAME',
        label_password: 'PASSWORD',
        label_email: 'EMAIL',
        label_phone: 'PHONE (OPTIONAL)',
        ph_username: 'Enter username',
        ph_password: 'Enter password',
        ph_username_reg: '3-20 characters',
        ph_password_reg: 'At least 6 characters',
        ph_email: 'For password recovery',
        ph_phone: 'Optional',
        btn_login: 'Login',
        btn_register: 'Register',
        back_home: '← Back to Home',
        err_server: 'Server error',
        err_network: 'Network error: ',
    }
};
</script>
<script src="i18n.js"></script>

<script>
    const _redirect = new URLSearchParams(location.search).get('redirect') || 'index.html';
    function getRedirect() {
        // Only allow relative redirects for safety
        if (_redirect.startsWith('/') || _redirect.startsWith('index') || _redirect.startsWith('quiz') || _redirect.startsWith('papers') || _redirect.startsWith('analysis')) {
            return _redirect;
        }
        return 'index.html';
    }

    // Check if already logged in
    const token = localStorage.getItem('token');
    if (token) {
        fetch('/api/auth/me', { headers: { 'Authorization': `Bearer ${token}` } })
            .then(r => r.ok ? window.location.href = getRedirect() : localStorage.removeItem('token'))
            .catch(() => {});
    }

    function showTab(tab) {
        document.querySelectorAll('.tab').forEach((t, i) =>
            t.classList.toggle('active', (tab === 'login' ? i === 0 : i === 1)));
        document.getElementById('loginForm').classList.toggle('active', tab === 'login');
        document.getElementById('registerForm').classList.toggle('active', tab === 'register');
    }

    function showMsg(id, text, type) {
        const el = document.getElementById(id);
        el.textContent = text;
        el.className = `message show ${type}`;
    }

    async function handleLogin(e) {
        e.preventDefault();
        const form = e.target;
        const data = { username: form.username.value, password: form.password.value };
        window.KangarooAnalytics?.track('auth_login_attempt');

        try {
            const r = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data),
            });

            const text = await r.text();
            let res;
            try {
                res = JSON.parse(text);
            } catch {
                showMsg('loginMsg', `${I18n.t('err_server')} (${r.status}): ${text.slice(0, 120)}`, 'error');
                return;
            }

            if (r.ok) {
                window.KangarooAnalytics?.track('auth_login_success');
                localStorage.setItem('token', res.token);
                localStorage.setItem('user', JSON.stringify(res.user));
                window.location.href = getRedirect();
            } else {
                window.KangarooAnalytics?.track('auth_login_failure', { group: 'friction', label: res.error });
                showMsg('loginMsg', res.error, 'error');
            }
        } catch (err) {
            window.KangarooAnalytics?.track('auth_login_failure', { group: 'friction', label: err.message });
            showMsg('loginMsg', I18n.t('err_network') + err.message, 'error');
        }
    }

    async function handleRegister(e) {
        e.preventDefault();
        const form = e.target;
        const data = {
            username: form.username.value,
            password: form.password.value,
            email: form.email.value,
            phone: form.phone.value || undefined,
        };

        window.KangarooAnalytics?.track('auth_register_attempt');
        try {
            const r = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data),
            });
            const text = await r.text();
            let res;
            try {
                res = JSON.parse(text);
            } catch {
                showMsg('registerMsg', `${I18n.t('err_server')} (${r.status}): ${text.slice(0, 120)}`, 'error');
                return;
            }

            if (r.ok) {
                window.KangarooAnalytics?.track('auth_register_success');
                showMsg('registerMsg', res.message, 'success');
                setTimeout(() => showTab('login'), 1500);
            } else {
                window.KangarooAnalytics?.track('auth_register_failure', { group: 'friction', label: res.error });
                showMsg('registerMsg', res.error, 'error');
            }
        } catch (err) {
            window.KangarooAnalytics?.track('auth_register_failure', { group: 'friction', label: err.message });
            showMsg('registerMsg', I18n.t('err_network') + err.message, 'error');
        }
    }
</script>
</body>
</html>
