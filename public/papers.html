<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMC Papers · 真题浏览</title>
    <script src="analytics.js"></script>
    <script src="auth-guard.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #f7f2eb;
            --panel: #fffaf5;
            --line: rgba(98, 64, 41, 0.12);
            --text: #2d241e;
            --muted: #77685d;
            --accent: #9f4c24;
            --shadow: 0 16px 48px rgba(60, 36, 20, 0.09);
        }
        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top, rgba(159, 76, 36, 0.12), transparent 22%),
                linear-gradient(180deg, #fcf9f5 0%, var(--bg) 100%);
            color: var(--text);
            font-family: "Georgia", "STSong", serif;
        }
        .page {
            width: min(1120px, calc(100vw - 32px));
            margin: 0 auto;
            padding: 28px 0 48px;
        }
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 22px;
            flex-wrap: wrap;
        }
        .back {
            text-decoration: none;
            color: var(--muted);
            padding: 8px 14px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: rgba(255,255,255,0.74);
            font-size: 0.85rem;
        }
        .back:hover { color: var(--accent); }
        h1 { font-size: clamp(1.9rem, 4vw, 3rem); }
        .sub { color: var(--muted); line-height: 1.8; font-size: 0.92rem; margin-top: 8px; }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 24px 0 18px;
        }
        .tab {
            border: 1px solid var(--line);
            background: rgba(255,255,255,0.72);
            color: var(--muted);
            padding: 10px 16px;
            border-radius: 999px;
            cursor: pointer;
            font: inherit;
        }
        .tab.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }
        .summary {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 18px;
        }
        .summary-card,
        .year-card {
            background: var(--panel);
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
        }
        .summary-card {
            border-radius: 20px;
            padding: 18px 16px;
        }
        .summary-card strong {
            display: block;
            color: var(--accent);
            font-size: 1.4rem;
        }
        .summary-card span {
            color: var(--muted);
            font-size: 0.82rem;
        }
        .year-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 18px;
        }
        .year-card {
            border-radius: 28px;
            padding: 22px;
            display: grid;
            gap: 16px;
            align-content: start;
        }
        .year-card.ready {
            border-color: rgba(159, 76, 36, 0.18);
        }
        .year-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
        }
        .year-header {
            display: grid;
            gap: 4px;
        }
        .year-header strong {
            font-size: clamp(1.8rem, 2vw, 2.2rem);
            line-height: 1;
            color: var(--accent);
        }
        .year-header span {
            color: var(--muted);
            font-size: 0.82rem;
            line-height: 1.4;
        }
        .year-level {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 6px 12px;
            border-radius: 999px;
            background: rgba(159, 76, 36, 0.08);
            color: var(--accent);
            font-size: 0.74rem;
            white-space: nowrap;
        }
        .status {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .chip {
            display: inline-flex;
            align-items: center;
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 0.74rem;
            line-height: 1;
            background: rgba(159, 76, 36, 0.08);
            color: var(--accent);
        }
        .chip.ready {
            background: rgba(55, 120, 84, 0.1);
            color: #2f7d5a;
        }
        .links {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
        }
        .link {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--text);
            background: white;
            border: 1px solid var(--line);
            width: 100%;
            box-sizing: border-box;
            min-height: 44px;
            padding: 10px 12px;
            border-radius: 14px;
            margin: 0;
            appearance: none;
            -webkit-appearance: none;
            font: inherit;
            font-size: 0.88rem;
            font-weight: 600;
            text-align: center;
            line-height: 1.2;
        }
        .link-label {
            display: block;
            line-height: 1;
        }
        button.link {
            cursor: pointer;
        }
        button.link::-moz-focus-inner {
            border: 0;
            padding: 0;
        }
        .link:hover { border-color: rgba(159, 76, 36, 0.3); color: var(--accent); }
        .link.disabled {
            position: relative;
            opacity: 0.58;
            color: #9f8f82;
            background: rgba(255, 255, 255, 0.78);
            cursor: not-allowed;
        }
        .link.disabled:hover {
            color: #8d7c6f;
            border-color: rgba(98, 64, 41, 0.2);
        }
        .link.disabled::before,
        .link.disabled::after {
            position: absolute;
            left: 50%;
            opacity: 0;
            pointer-events: none;
            transition: opacity 160ms ease, transform 160ms ease;
        }
        .link.disabled::before {
            content: "";
            bottom: calc(100% + 4px);
            transform: translate(-50%, 6px);
            border-width: 6px;
            border-style: solid;
            border-color: rgba(45, 36, 30, 0.96) transparent transparent transparent;
        }
        .link.disabled::after {
            content: attr(data-disabled-reason);
            bottom: calc(100% + 12px);
            transform: translate(-50%, 6px);
            width: max-content;
            max-width: min(240px, calc(100vw - 56px));
            padding: 8px 10px;
            border-radius: 12px;
            background: rgba(45, 36, 30, 0.96);
            color: #fffaf5;
            box-shadow: 0 12px 30px rgba(45, 36, 30, 0.18);
            font-size: 0.76rem;
            line-height: 1.45;
            white-space: normal;
            text-align: center;
            z-index: 3;
        }
        .link.disabled:hover::before,
        .link.disabled:hover::after,
        .link.disabled:focus-visible::before,
        .link.disabled:focus-visible::after {
            opacity: 1;
            transform: translate(-50%, 0);
        }
        .note {
            color: var(--muted);
            line-height: 1.7;
            font-size: 0.84rem;
            min-height: 3.6em;
        }
        .note.ready {
            color: #5f5348;
        }
        .empty {
            padding: 28px;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 24px;
            color: var(--muted);
            text-align: center;
        }
        @media (max-width: 920px) {
            .summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .year-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 640px) {
            .links {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="topbar">
            <div>
                <a class="back" href="index.html">← 返回首页</a>
                <h1>AMC 真题浏览</h1>
                <p class="sub">按层级和年份浏览原始试卷与答案解析。所有链接由题库构建脚本生成的 manifest 驱动。</p>
            </div>
        </div>

        <div class="toolbar" id="tabs">
            <button class="tab active" data-level="a">AMC A · 3-4 年级</button>
            <button class="tab" data-level="b">AMC B · 5-6 年级</button>
            <button class="tab" data-level="c">AMC C · 7-8 年级</button>
        </div>

        <section class="summary" id="summary">
            <div class="summary-card"><strong>--</strong><span>试卷</span></div>
            <div class="summary-card"><strong>--</strong><span>带答案</span></div>
            <div class="summary-card"><strong>--</strong><span>可在线练习</span></div>
            <div class="summary-card"><strong>--</strong><span>年份范围</span></div>
        </section>

        <section class="year-grid" id="yearGrid">
            <div class="empty">正在读取题库索引...</div>
        </section>
    </div>

    <script>
        const state = {
            currentLevel: new URLSearchParams(location.search).get("level") || "a",
            manifest: null,
        };

        function levelData() {
            return state.manifest?.levels?.find((item) => item.id === state.currentLevel) || null;
        }

        function renderTabs() {
            document.querySelectorAll(".tab").forEach((tab) => {
                tab.classList.toggle("active", tab.dataset.level === state.currentLevel);
            });
        }

        function renderSummary() {
            const level = levelData();
            const host = document.getElementById("summary");
            if (!level) {
                host.innerHTML = `
                    <div class="summary-card"><strong>0</strong><span>试卷</span></div>
                    <div class="summary-card"><strong>0</strong><span>带答案</span></div>
                    <div class="summary-card"><strong>0</strong><span>可在线练习</span></div>
                    <div class="summary-card"><strong>--</strong><span>年份范围</span></div>
                `;
                return;
            }

            const answers = level.years.filter((year) => year.answer).length;
            const ready = level.years.filter((year) => year.quizReady).length;
            const minYear = level.years[level.years.length - 1]?.year || "--";
            const maxYear = level.years[0]?.year || "--";

            host.innerHTML = `
                <div class="summary-card"><strong>${level.years.length}</strong><span>试卷</span></div>
                <div class="summary-card"><strong>${answers}</strong><span>带答案</span></div>
                <div class="summary-card"><strong>${ready}</strong><span>可在线练习</span></div>
                <div class="summary-card"><strong>${minYear}-${maxYear}</strong><span>年份范围</span></div>
            `;
        }

        function renderYears() {
            const host = document.getElementById("yearGrid");
            const level = levelData();
            if (!level) {
                host.innerHTML = `<div class="empty">未找到当前层级数据。先运行 <code>npm run build:library</code>。</div>`;
                return;
            }

            host.innerHTML = level.years.map((year) => {
                const status = [];
                if (year.paper) status.push(`<span class="chip">试卷</span>`);
                if (year.answer) status.push(`<span class="chip">答案 / 解析</span>`);
                if (year.quizReady) status.push(`<span class="chip ready">在线练习已就绪</span>`);
                const paperReason = year.paper ? "" : "该年份试卷暂未收录，稍后会继续补齐。";
                const answerReason = year.answer ? "" : "该年份答案或解析暂未收录。";
                const quizReason = year.quizReady ? "" : "这套题的在线练习题集还在整理中。";

                return `
                    <article class="year-card ${year.quizReady ? "ready" : ""}">
                        <div class="year-top">
                            <div class="year-header">
                                <strong>${year.year}</strong>
                                <span>${level.grade}</span>
                            </div>
                            <span class="year-level">${level.label}</span>
                        </div>
                        <div class="status">${status.join("") || `<span class="chip">仅索引</span>`}</div>
                        <div class="links">
                            <button class="link ${year.paper ? "" : "disabled"}" type="button"
                                data-action="open-resource" data-kind="paper" data-year="${year.year}"
                                data-url="${year.paper?.url || ""}"
                                data-disabled-reason="${paperReason}"
                                title="${paperReason}">
                                <span class="link-label">打开试卷</span>
                            </button>
                            <button class="link ${year.answer ? "" : "disabled"}" type="button"
                                data-action="open-resource" data-kind="answer" data-year="${year.year}"
                                data-url="${year.answer?.url || ""}"
                                data-disabled-reason="${answerReason}"
                                title="${answerReason}">
                                <span class="link-label">打开答案</span>
                            </button>
                            <a class="link ${year.quizReady ? "" : "disabled"}" href="${year.quizReady ? `quiz.html?level=${state.currentLevel}&year=${year.year}` : "#"}"
                                data-disabled-reason="${quizReason}"
                                title="${quizReason}">
                                <span class="link-label">进入练习</span>
                            </a>
                        </div>
                        <div class="note ${year.quizReady ? "ready" : ""}">
                            ${year.quizReady ? "这套题已经可以直接在线作答、提交判题并查看解析。" : "当前提供试卷与答案浏览，在线练习题集还在整理中。"}
                        </div>
                    </article>
                `;
            }).join("");
        }

        async function loadManifest() {
            try {
                const response = await fetch("data/index.json");
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                state.manifest = await response.json();
            } catch (error) {
                document.getElementById("yearGrid").innerHTML =
                    `<div class="empty">读取失败：${error.message}。请先运行 <code>npm run build:library</code>。</div>`;
                return;
            }

            renderTabs();
            renderSummary();
            renderYears();
        }

        async function openProtectedResource(resourceUrl) {
            const token = localStorage.getItem("token");
            if (!token) {
                window.requireLogin?.("登录后才能打开试卷或答案。普通用户最多可下载 5 次。");
                return false;
            }

            const response = await fetch(resourceUrl, {
                headers: {
                    "Authorization": `Bearer ${token}`,
                },
            });

            const payload = await response.clone().json().catch(() => ({}));
            if (response.status === 401) {
                localStorage.removeItem("token");
                localStorage.removeItem("user");
                window.requireLogin?.("登录后才能打开试卷或答案。普通用户最多可下载 5 次。");
                return false;
            }

            if (!response.ok) {
                alert(payload.error || "当前操作失败，请稍后再试。");
                return false;
            }

            return {
                blob: await response.blob(),
                contentType: response.headers.get("Content-Type") || "",
            };
        }

        function writePopupShell(popup, title) {
            if (!popup) return;
            popup.document.write(`
                <!DOCTYPE html>
                <html lang="zh-CN">
                <head>
                    <meta charset="UTF-8">
                    <meta name="viewport" content="width=device-width, initial-scale=1.0">
                    <title>${title}</title>
                    <style>
                        * { box-sizing: border-box; }
                        body {
                            margin: 0;
                            min-height: 100vh;
                            background: #f7f2eb;
                            color: #2d241e;
                            font-family: "Georgia", "STSong", serif;
                        }
                        .viewer-shell {
                            min-height: 100vh;
                            display: grid;
                            place-items: center;
                            padding: 24px;
                        }
                        .viewer-card {
                            width: min(100%, 960px);
                            padding: 20px 22px;
                            border-radius: 24px;
                            background: #fffaf5;
                            border: 1px solid rgba(98, 64, 41, 0.12);
                            box-shadow: 0 16px 48px rgba(60, 36, 20, 0.09);
                            text-align: center;
                            line-height: 1.7;
                        }
                        .viewer-card h2 {
                            margin: 0 0 8px;
                            color: #9f4c24;
                            font-size: 1.5rem;
                        }
                        .viewer-card p {
                            margin: 0;
                            color: #77685d;
                            font-size: 0.95rem;
                        }
                        .viewer-frame {
                            width: 100vw;
                            height: 100vh;
                            border: 0;
                            background: white;
                        }
                        .viewer-image {
                            display: block;
                            max-width: 100%;
                            margin: 0 auto;
                        }
                        .viewer-actions {
                            display: flex;
                            justify-content: center;
                            gap: 12px;
                            padding: 16px;
                            background: #fffaf5;
                            border-bottom: 1px solid rgba(98, 64, 41, 0.12);
                        }
                        .viewer-actions a {
                            display: inline-flex;
                            align-items: center;
                            justify-content: center;
                            min-height: 42px;
                            padding: 0 16px;
                            border-radius: 999px;
                            color: #2d241e;
                            text-decoration: none;
                            border: 1px solid rgba(98, 64, 41, 0.12);
                            background: white;
                        }
                    </style>
                </head>
                <body>
                    <div class="viewer-shell">
                        <div class="viewer-card">
                            <h2>正在加载资源</h2>
                            <p>文件校验通过后会直接显示，如果较大请稍等几秒。</p>
                        </div>
                    </div>
                </body>
                </html>
            `);
            popup.document.close();
        }

        function renderResourcePopup(popup, resource, resourceUrl, title) {
            const blobUrl = URL.createObjectURL(resource.blob);
            const contentType = (resource.contentType || resource.blob.type || "").toLowerCase();
            const isImage = contentType.startsWith("image/");
            const downloadName = resourceUrl.split("/").pop() || "resource";

            if (!popup) {
                const fallback = document.createElement("a");
                fallback.href = blobUrl;
                fallback.target = "_blank";
                fallback.rel = "noopener";
                fallback.click();
                setTimeout(() => URL.revokeObjectURL(blobUrl), 60_000);
                return;
            }

            popup.document.open();
            popup.document.write(`
                <!DOCTYPE html>
                <html lang="zh-CN">
                <head>
                    <meta charset="UTF-8">
                    <meta name="viewport" content="width=device-width, initial-scale=1.0">
                    <title>${title}</title>
                    <style>
                        * { box-sizing: border-box; }
                        html, body {
                            margin: 0;
                            min-height: 100%;
                            background: #f7f2eb;
                            color: #2d241e;
                            font-family: "Georgia", "STSong", serif;
                        }
                        body {
                            min-height: 100vh;
                            display: flex;
                            flex-direction: column;
                        }
                        .viewer-actions {
                            display: flex;
                            justify-content: center;
                            gap: 12px;
                            padding: 14px 16px;
                            background: #fffaf5;
                            border-bottom: 1px solid rgba(98, 64, 41, 0.12);
                        }
                        .viewer-actions a {
                            display: inline-flex;
                            align-items: center;
                            justify-content: center;
                            min-height: 40px;
                            padding: 0 16px;
                            border-radius: 999px;
                            color: #2d241e;
                            text-decoration: none;
                            border: 1px solid rgba(98, 64, 41, 0.12);
                            background: white;
                        }
                        .viewer-body {
                            flex: 1;
                            padding: ${isImage ? "24px" : "0"};
                        }
                        .viewer-frame {
                            display: block;
                            width: 100%;
                            height: calc(100vh - 69px);
                            border: 0;
                            background: white;
                        }
                        .viewer-image {
                            display: block;
                            max-width: 100%;
                            margin: 0 auto;
                            box-shadow: 0 16px 48px rgba(60, 36, 20, 0.09);
                        }
                    </style>
                </head>
                <body>
                    <div class="viewer-actions">
                        <a href="${blobUrl}" download="${downloadName}">下载文件</a>
                        <a href="${blobUrl}" target="_blank" rel="noopener">新标签打开</a>
                    </div>
                    <div class="viewer-body">
                        ${isImage
                            ? `<img class="viewer-image" src="${blobUrl}" alt="${title}">`
                            : `<iframe class="viewer-frame" src="${blobUrl}" title="${title}"></iframe>`}
                    </div>
                </body>
                </html>
            `);
            popup.document.close();
            popup.addEventListener("beforeunload", () => {
                setTimeout(() => URL.revokeObjectURL(blobUrl), 1_000);
            }, { once: true });
        }

        document.getElementById("tabs").addEventListener("click", (event) => {
            const button = event.target.closest(".tab");
            if (!button) return;
            state.currentLevel = button.dataset.level;
            history.replaceState(null, "", `papers.html?level=${state.currentLevel}`);
            renderTabs();
            renderSummary();
            renderYears();
            window.AMCAnalytics?.track("papers_level_switch", { meta: { level: state.currentLevel } });
        });

        document.getElementById("yearGrid").addEventListener("click", async (event) => {
            const disabledLink = event.target.closest(".link.disabled");
            if (disabledLink) {
                event.preventDefault();
                const reason = disabledLink.dataset.disabledReason;
                if (reason) alert(reason);
                return;
            }

            const button = event.target.closest('[data-action="open-resource"]');
            if (!button || button.classList.contains("disabled")) return;

            const popup = window.open("", "_blank");
            writePopupShell(popup, "AMC 资源加载中");
            const targetUrl = button.dataset.url;
            if (!targetUrl) {
                popup?.close();
                return;
            }

            const resource = await openProtectedResource(targetUrl);
            if (!resource) {
                popup?.close();
                return;
            }

            const resourceTitle = `${button.dataset.year || ""} ${button.dataset.kind === "answer" ? "答案" : "试卷"}`.trim();
            renderResourcePopup(popup, resource, targetUrl, resourceTitle || "AMC 资源查看");
        });

        loadManifest();
    </script>
</body>
</html>
